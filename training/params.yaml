# training/params.yaml — 学習パラメータ（対話入力なしで Run all する前提）
#
# Colab シークレット HF_LORA_REPO / HF_MODEL_REPO があれば、以下の Hub ID より優先（GitHub を編集しなくてよい）。
# ローカルは同じ名前を .env に書いてもよい。

# Hugging Face: ベースモデル（Unsloth 公式の 4bit。存在する ID を指定すること）
# 参考: https://huggingface.co/unsloth/Llama-3.2-3B-Instruct-bnb-4bit
hf_model_repo: "unsloth/Llama-3.2-3B-Instruct-bnb-4bit"

# Hugging Face: LoRA アップロード先。Colab ではシークレット HF_LORA_REPO を推奨。
hf_lora_repo: "YOUR_USERNAME/YOUR_LORA_REPO"

# 学習用 JSONL。相対パスはリポジトリルート基準。
# 環境変数 TRAINING_DATASET_PATH または TRAINING_DATASET_URL があればこちらより優先。
dataset_jsonl: "data/dataset.jsonl"
# 形式: alpaca | messages | text | prompt_completion | auto（先頭行のキーから推定）
# 環境変数 TRAINING_DATASET_FORMAT（Colab シークレット可）があればこちら優先。
dataset_format: auto

# Training Parameters
lora_r: 16
lora_alpha: 16
lora_dropout: 0.1
max_seq_length: 2048
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
warmup_steps: 5
max_steps: 60
# 科学記数 2e-4 は環境によって str 解釈されることがあるため 0.0002 を推奨
learning_rate: 0.0002
fp16: true
logging_steps: 1
output_dir: "outputs"
optim: "paged_adamw_8bit"
seed: 42
