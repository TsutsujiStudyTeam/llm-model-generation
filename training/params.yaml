# training/params.yaml
# Hugging Face Model Repository for base model
hf_model_repo: "unsloth/llama-3.2-alpaca-bnb-4bit"

# Hugging Face LoRA Adapter Repository (USER MUST UPDATE THIS)
# e.g., "YOUR_HF_USERNAME/llama-3.2-lora-adapter"
hf_lora_repo: "YOUR_HF_USERNAME/my-llama-3.2-lora-adapter"

# Training Parameters
lora_r: 16
lora_alpha: 16
lora_dropout: 0.1
max_seq_length: 2048
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
warmup_steps: 5
max_steps: 60
learning_rate: 2e-4
fp16: true
logging_steps: 1
output_dir: "outputs"
optim: "paged_adamw_8bit"
seed: 42