# training/params.yaml — 学習パラメータ（対話入力なしで Run all する前提）
#
# hf_lora_repo: Hugging Face 上の LoRA アップロード先（空のモデルリポジトリを事前に作成）
#   環境変数 HF_LORA_REPO が設定されていればそちらが優先されます。

# Hugging Face: ベースモデル（Unsloth 4bit）
hf_model_repo: "unsloth/llama-3.2-alpaca-bnb-4bit"

# Hugging Face: LoRA アダプタの保存先（必ず自分の user/repo に書き換える）
hf_lora_repo: "Copel1/my-llama-3.2-lora-adapter"

# Training Parameters
lora_r: 16
lora_alpha: 16
lora_dropout: 0.1
max_seq_length: 2048
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
warmup_steps: 5
max_steps: 60
learning_rate: 2e-4
fp16: true
logging_steps: 1
output_dir: "outputs"
optim: "paged_adamw_8bit"
seed: 42
